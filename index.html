<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-text">
        <div class="header-eyebrow" data-i18n="ui.eyebrow">AI LAB · Школа дизайна НИУ ВШЭ · Вадим Булгаков</div>
        <h1 class="header-title">
          <span data-i18n="ui.title.line1">32 сценария коллаборативной работы</span><br>
          <em data-i18n="ui.title.line2">человека и ИИ</em>

        </h1>

      <div class="header-controls">
        <div class="lang-switcher" id="langSwitcher">

            <span id="langCurrentLabel">RU</span>
            <span class="lang-arrow">▾</span>
          </button>
          <div class="lang-dropdown" id="langDropdown" role="menu">

            <button class="lang-option" data-lang="de" role="menuitem">DE — Deutsch</button>
            <button class="lang-option" data-lang="fr" role="menuitem">FR — Français</button>
            <button class="lang-option" data-lang="hu" role="menuitem">HU — Magyar</button>
            <button class="lang-option" data-lang="es" role="menuitem">ES — Español</button>
            <button class="lang-option" data-lang="zh" role="menuitem">ZH — 中文</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-bar-inner">

      <!-- Open filter modal -->
      <button class="filter-open-btn" id="filterOpenBtn" aria-haspopup="dialog">
        <span class="filter-open-icon">⊟</span>
        <span data-i18n="ui.questionnaire.intro_label">Найдите свой сценарий</span>
        <span class="filter-answered-badge" id="filterAnsweredBadge" style="display:none"></span>
      </button>

      <!-- Active filter chips -->
      <div class="filter-chips" id="filterChips"></div>

      <div class="filter-bar-right">
        <!-- Match counter -->
        <div class="match-counter">
          <strong id="visibleCount">32</strong>
          <span data-i18n="ui.questionnaire.of_total">из 32</span>
        </div>

        <!-- Reset -->
        <button class="reset-btn" id="resetBtn" style="display:none">
          <span>↺</span>
          <span data-i18n="ui.questionnaire.reset">Сбросить</span>
        </button>

        <!-- Search -->
        <input class="search-input" id="searchInput" type="text" data-i18n-placeholder="ui.search.placeholder">

        <!-- View toggle -->
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" title="Grid">⊞</button>
          <button class="view-btn" id="listBtn" title="List">☰</button>
        </div>
      </div>
    </div>

    <!-- Legend strip -->
    <div class="legend-strip">
      <div class="legend-item"><span class="legend-dot aug"></span><span data-i18n="ui.modes.aug">Аугментация</span></div>
      <div class="legend-item"><span class="legend-dot coop"></span><span data-i18n="ui.modes.coop">Кооперация</span></div>
      <div class="legend-item"><span class="legend-dot auto"></span><span data-i18n="ui.modes.auto">Автоматизация</span></div>
    </div>
  </div>

  <main class="main-content">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">◯</div>
      <p data-i18n="ui.empty_state"></p>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </main>

  <!-- FILTER MODAL -->
  <div class="fmodal-overlay" id="fmodalOverlay" role="dialog" aria-modal="true" aria-label="Фильтр">
    <div class="fmodal" id="fmodal">

      <div class="fmodal-header">
        <div>
          <div class="fmodal-label" data-i18n="ui.questionnaire.intro_label">Найдите свой сценарий</div>
          <p class="fmodal-desc" data-i18n="ui.questionnaire.intro_text">Ответьте на 5 вопросов о вашей задаче — система подберёт подходящие сценарии.</p>
        </div>
        <button class="fmodal-close" id="fmodalCloseBtn" aria-label="Закрыть">×</button>
      </div>

      <div class="questions-list" id="questionsList">

        <div class="question-block" data-question="stage">
          <div class="question-header">
            <span class="question-num">01</span>
            <span class="question-text" data-i18n="ui.questionnaire.q1.label"></span>
          </div>
          <div class="question-options">
            <button class="q-option" data-question="stage" data-value="research">
              <span class="q-option-icon">◌</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q1.research"></span>
            </button>
            <button class="q-option" data-question="stage" data-value="impl">
              <span class="q-option-icon">◉</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q1.impl"></span>
            </button>
          </div>
        </div>

        <div class="question-block" data-question="expertise">
          <div class="question-header">
            <span class="question-num">02</span>
            <span class="question-text" data-i18n="ui.questionnaire.q2.label"></span>
          </div>
          <div class="question-options">
            <button class="q-option" data-question="expertise" data-value="low">
              <span class="q-option-icon">−</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q2.low"></span>
            </button>
            <button class="q-option" data-question="expertise" data-value="high">
              <span class="q-option-icon">+</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q2.high"></span>
            </button>
          </div>
        </div>

        <div class="question-block" data-question="speed">
          <div class="question-header">
            <span class="question-num">03</span>
            <span class="question-text" data-i18n="ui.questionnaire.q3.label"></span>
          </div>
          <div class="question-options">
            <button class="q-option" data-question="speed" data-value="low">
              <span class="q-option-icon">◷</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q3.low"></span>
            </button>
            <button class="q-option" data-question="speed" data-value="high">
              <span class="q-option-icon">⚡</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q3.high"></span>
            </button>
          </div>
        </div>

        <div class="question-block" data-question="motivation">
          <div class="question-header">
            <span class="question-num">04</span>
            <span class="question-text" data-i18n="ui.questionnaire.q4.label"></span>
          </div>
          <div class="question-options">
            <button class="q-option" data-question="motivation" data-value="low">
              <span class="q-option-icon">□</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q4.low"></span>
            </button>
            <button class="q-option" data-question="motivation" data-value="high">
              <span class="q-option-icon">■</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q4.high"></span>
            </button>
          </div>
        </div>

        <div class="question-block" data-question="cost">
          <div class="question-header">
            <span class="question-num">05</span>
            <span class="question-text" data-i18n="ui.questionnaire.q5.label"></span>
          </div>
          <div class="question-options">
            <button class="q-option" data-question="cost" data-value="low">
              <span class="q-option-icon">○</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q5.low"></span>
            </button>
            <button class="q-option" data-question="cost" data-value="high">
              <span class="q-option-icon">●</span>
              <span class="q-option-text" data-i18n="ui.questionnaire.q5.high"></span>
            </button>
          </div>
        </div>
